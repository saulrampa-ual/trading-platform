services:
  # Kafka con configuración moderna (como en el ejemplo)
  kafka:
    image: apache/kafka:4.2.0
    container_name: trading-kafka
    restart: always
    ports:
      - '9092:9092'
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://:19092,EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:19092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      trading-net:
        ipv4_address: 172.28.1.31

  # Redpanda Console para monitorear Kafka (opcional)
  redpanda-console:
    image: redpandadata/console:v3.5.3
    container_name: trading-kafka-console
    restart: always
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_BROKERS: kafka:19092
      SCHEMAREGISTRY_ENABLED: "false"
    networks:
      trading-net:
        ipv4_address: 172.28.1.32

  # InfluxDB
  influxdb:
    image: influxdb:2.7
    container_name: trading-influxdb
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: admin123
      DOCKER_INFLUXDB_INIT_ORG: trading
      DOCKER_INFLUXDB_INIT_BUCKET: market_data
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: trading-token-123
    volumes:
      - influxdb-data:/var/lib/influxdb2
    networks:
      trading-net:
        ipv4_address: 172.28.1.40

  # Spark Master
  spark-master:
    build:
      context: .
      dockerfile: Dockerfile.spark
    image: trading-spark-custom
    container_name: spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    environment:
      - SPARK_MASTER_HOST=spark-master
      - PYSPARK_PYTHON=python3.13
    ports:
      - "8080:8080"
      - "7077:7077"
    restart: always
    networks:
      trading-net:
        ipv4_address: 172.28.1.10
    volumes:
      - ./spark:/opt/spark-apps
      - ./config:/opt/spark-config

  # Spark Worker 1
  spark-worker-1:
    image: trading-spark-custom
    container_name: spark-worker-1
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=2g
      - PYSPARK_PYTHON=python3.13
    ports:
      - "8081:8081"
    depends_on:
      - spark-master
    restart: always
    networks:
      trading-net:
        ipv4_address: 172.28.1.11
    volumes:
      - ./spark:/opt/spark-apps

  # Grafana
  grafana:
    image: grafana/grafana:10.2.0
    container_name: trading-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - influxdb
    networks:
      trading-net:
        ipv4_address: 172.28.1.50

networks:
  trading-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.1.0/24

volumes:
  kafka-data:
  influxdb-data:
  grafana-data: